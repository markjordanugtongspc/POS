<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Terminal - Support Tickets</title>
  <link rel="stylesheet" href="../../src/style.css">
</head>

<body
  class="bg-neutral-100 dark:bg-dark-bg text-neutral-800 dark:text-neutral-100 min-h-screen transition-colors duration-300">

  <div id="app" class="min-h-screen">
    <!-- Sidebar & Top Navbar injected dynamically via main.js -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="p-4 sm:ml-64 mt-14">
      <div class="p-4 border border-neutral-200 dark:border-neutral-800 border-dashed rounded-none">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
          <div>
            <h1 class="text-xl font-black text-neutral-900 dark:text-white tracking-tight">Support Tickets</h1>
            <p class="text-xs text-neutral-500 dark:text-neutral-400">Manage customer queries and system support requests.</p>
          </div>
        </div>

        <!-- Dual Pane Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 h-[calc(100vh-200px)] min-h-[500px]">
          
          <!-- Left Pane (Search & Cards) -->
          <div id="pane-left" class="lg:col-span-5 flex flex-col h-full bg-white dark:bg-[#1f2029] border border-neutral-200 dark:border-neutral-800 rounded-none shadow-sm overflow-hidden">
            
            <!-- Sticky Search Bar & Category Filter -->
            <div class="p-4 border-b border-neutral-200 dark:border-neutral-800 shrink-0 flex gap-2">
              <div class="relative flex-1">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                  <svg class="w-4 h-4 text-neutral-500 dark:text-neutral-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                  </svg>
                </div>
                <input type="text" id="ticket-search-input"
                  class="bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 text-neutral-900 dark:text-white text-xs rounded-none focus:ring-emerald-500 focus:border-emerald-500 block w-full ps-10 p-2.5 font-bold"
                  placeholder="Search tickets by user or title...">
              </div>
              <select id="ticket-category-filter"
                class="bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 text-neutral-900 dark:text-white text-xs rounded-none p-2.5 font-bold focus:ring-emerald-500 focus:border-emerald-500 cursor-pointer max-w-[120px] shrink-0">
                <option value="All">All Categories</option>
                <option value="Software Bug">Bug</option>
                <option value="Hardware / Printer">Printer</option>
                <option value="Sales / Billing">Billing</option>
                <option value="Stock Sync / DB">Sync</option>
                <option value="Network / Offline">Offline</option>
                <option value="General Support">General</option>
              </select>
            </div>

            <!-- Scrollable Cards Area -->
            <div id="tickets-list-container" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
              <!-- Dynamically populated ticket cards -->
            </div>
            
          </div>

          <!-- Right Pane (Ticket Detail or Placeholder) -->
          <div id="pane-right" class="hidden lg:flex lg:col-span-7 flex-col h-full bg-white dark:bg-[#1f2029] border border-neutral-200 dark:border-neutral-800 rounded-none shadow-sm overflow-hidden relative">
            
            <!-- Default Placeholder State -->
            <div id="ticket-placeholder-state" class="flex flex-col items-center justify-center h-full p-8 text-center">
              <div class="w-16 h-16 bg-emerald-50 dark:bg-emerald-950/20 rounded-full flex items-center justify-center mb-4 text-emerald-600 dark:text-emerald-400">
                <svg class="w-8 h-8" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17h6l3 3v-3h2V9a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2v3l2-3Z"/>
                </svg>
              </div>
              <h3 class="text-sm font-black text-neutral-800 dark:text-white mb-2">Select a Ticket</h3>
              <p class="text-xs text-neutral-400 dark:text-neutral-500 max-w-sm mb-6">Click any message inbox to show here or create a new ticket to get assistance.</p>
              
              <!-- Create Ticket Trigger Button -->
              <button id="btn-create-ticket-trigger" type="button"
                class="cursor-pointer inline-flex items-center justify-center px-5 py-3 text-xs font-black text-white bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all shadow-md rounded-none focus:outline-none focus:ring-4 focus:ring-emerald-500/20">
                <svg class="w-4 h-4 me-2 -ms-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14m-7-7v14"/>
                </svg>
                NEW TICKET
              </button>
            </div>

            <!-- Active Ticket Detail View (Hidden initially) -->
            <div id="ticket-detail-view" class="hidden flex flex-col h-full">
              <!-- Header -->
              <div class="p-4 border-b border-neutral-200 dark:border-neutral-800 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 min-w-0">
                  <!-- Back button -->
                  <button id="btn-ticket-back" type="button" class="cursor-pointer p-1.5 hover:bg-neutral-100 dark:hover:bg-neutral-800 text-neutral-500 hover:text-emerald-500 rounded-none shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                    </svg>
                  </button>
                  <div id="detail-user-avatar" class="w-10 h-10 rounded-full bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center font-bold shrink-0"></div>
                  <div class="min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span id="detail-ticket-id" class="text-[10px] font-black text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/20 px-1.5 py-0.5 border border-emerald-250 dark:border-emerald-800/40 select-all shrink-0"></span>
                      <h4 id="detail-ticket-title-bold" class="text-xs sm:text-sm font-black text-neutral-900 dark:text-white leading-tight truncate"></h4>
                    </div>
                    <p id="detail-user-name" class="text-[10px] font-bold text-neutral-450 dark:text-neutral-400 mt-0.5"></p>
                  </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                  <span id="detail-status-badge" class="px-2 py-0.5 rounded-none text-[9px] font-extrabold uppercase tracking-wider"></span>
                  <span id="detail-priority-badge" class="px-2 py-0.5 rounded-none text-[9px] font-extrabold uppercase tracking-wider"></span>
                </div>
              </div>

              <!-- Message History (Scrollable chat) -->
              <div id="detail-messages-container" class="flex-1 p-4 overflow-y-auto space-y-4 bg-neutral-50/50 dark:bg-[#16171d]/20 custom-scrollbar">
                <!-- Chat bubbles -->
              </div>

              <!-- Reply Input area -->
              <div class="p-4 border-t border-neutral-200 dark:border-neutral-800 shrink-0 bg-white dark:bg-[#1f2029]">
                <form id="reply-form" class="flex items-center gap-2">
                  <input type="text" id="reply-input" placeholder="Type a reply here..."
                    class="flex-1 bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 text-xs rounded-none p-3 font-bold focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none dark:text-white" required>
                  <button type="submit" class="cursor-pointer bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold text-xs rounded-none p-3 shadow-md active:scale-95 transition-all flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m14 0-4 4m4-4-4-4"/>
                    </svg>
                  </button>
                </form>
              </div>

            </div>

          </div>

        </div>

        <!-- Mobile Floating Action Button -->
        <button id="btn-create-ticket-mobile" type="button"
          class="fixed lg:hidden bottom-6 left-1/2 -translate-x-1/2 z-[40] cursor-pointer inline-flex items-center justify-center px-6 py-3 text-sm font-black text-white bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all shadow-xl shadow-emerald-500/30 rounded-full focus:outline-none focus:ring-4 focus:ring-emerald-500/20">
          <svg class="w-5 h-5 me-2 -ms-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14m-7-7v14"/>
          </svg>
          New ticket
        </button>

      </div>
    </div>
  </div>

  <script type="module" src="../../src/main.js"></script>
</body>

</html>
