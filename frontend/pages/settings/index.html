<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Terminal - Settings</title>
  <link rel="stylesheet" href="../../src/style.css">
</head>
<body class="bg-neutral-100 dark:bg-[#16171d] text-neutral-800 dark:text-neutral-100 min-h-screen transition-colors duration-300">
  
  <div id="app" class="min-h-screen">
    <!-- Sidebar & Top Navbar injected dynamically via main.js -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="p-4 sm:ml-64 mt-14">
      <div class="p-6 bg-white dark:bg-[#16171d] border border-neutral-200 dark:border-neutral-800 rounded-none shadow-sm max-w-xl">
        <h1 class="text-2xl font-extrabold text-neutral-900 dark:text-white mb-2 uppercase tracking-wide">Settings</h1>
        <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-6">Manage POS Terminal preferences, local caching, and devices.</p>
        
        <div class="space-y-4">
          <div class="p-4 bg-neutral-50 dark:bg-neutral-900/50 border border-neutral-200/50 dark:border-neutral-800/50 rounded-none flex items-center justify-between">
            <div>
              <h3 class="font-bold text-sm text-neutral-900 dark:text-white">Local Storage Cache</h3>
              <p class="text-xs text-neutral-500 dark:text-neutral-400">Clear cached cookies and localized settings</p>
            </div>
            <button class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-none transition cursor-pointer">Clear Cache</button>
          </div>

          <div class="p-4 bg-neutral-50 dark:bg-neutral-900/50 border border-neutral-200/50 dark:border-neutral-800/50 rounded-none flex items-center justify-between">
            <div>
              <h3 class="font-bold text-sm text-neutral-900 dark:text-white">Printer Connection</h3>
              <p class="text-xs text-neutral-500 dark:text-neutral-400">Bluetooth / USB POS receipt printer status</p>
            </div>
            <span class="text-xs font-bold text-neutral-400">Disconnected</span>
          </div>
        </div>

        <div class="mt-8 pt-4 border-t border-neutral-200 dark:border-neutral-800">
          <a href="/pages/dashboard/" class="inline-flex items-center text-xs font-bold text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 transition cursor-pointer">
            &larr; Return to Dashboard
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="../path/to/flowbite/dist/flowbite.min.js"></script>
  <script type="module" src="../../src/main.js"></script>
</body>
</html>
